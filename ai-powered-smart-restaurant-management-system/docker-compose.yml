version: '3.8'

services:
  mongo:
    image: mongo:7.0
    container_name: smart-restaurant-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: smartrestaurant
    volumes:
      - mongo_data:/data/db
    networks:
      - smart-restaurant-network

  server:
    build: ./server
    container_name: smart-restaurant-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://admin:password123@mongo:27017/smartrestaurant?authSource=admin
      - JWT_SECRET=your_jwt_secret_here
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - smart-restaurant-network

  client:
    build: ./client
    container_name: smart-restaurant-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    networks:
      - smart-restaurant-network

volumes:
  mongo_data:

networks:
  smart-restaurant-network:
    driver: bridge